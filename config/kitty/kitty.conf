# Premium Unixporn Kitty
# Global terminal theme

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto

font_size 11.5
disable_ligatures never

background #080d10
foreground #d7dbd2

selection_background #9db6ad
selection_foreground #080d10

cursor #c3ccb8
cursor_text_color #080d10
cursor_shape beam
cursor_blink_interval 0.6

url_color #9db6ad

active_border_color #9db6ad
inactive_border_color #5f6f6b
bell_border_color #b9828d

active_tab_background #0f1a1d
active_tab_foreground #f0f2e8
inactive_tab_background #080d10
inactive_tab_foreground #8b9892
tab_bar_background #080d10

# Palette
color0  #080d10
color1  #b9828d
color2  #9db6ad
color3  #c3ccb8
color4  #7fa6a2
color5  #a7a9be
color6  #8fb9b4
color7  #d7dbd2
color8  #5f6f6b
color9  #b9828d
color10 #9db6ad
color11 #c3ccb8
color12 #7fa6a2
color13 #a7a9be
color14 #8fb9b4
color15 #f0f2e8

background_opacity 0.88
dynamic_background_opacity yes

window_padding_width 10
confirm_os_window_close 0
hide_window_decorations yes

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
