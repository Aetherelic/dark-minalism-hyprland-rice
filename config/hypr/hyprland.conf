## =========================
# Hyprland config - Aetherelic
# Modern cozy HyDE-inspired setup
# =========================


# ---------- Monitors ----------
# Main left monitor: KTC 1440p 200Hz
monitor = DP-2,2560x1440@200,0x0,1

# Right monitor: Lenovo 1080p 60Hz, vertically centred
monitor = DP-1,1920x1080@60,2560x180,1


# ---------- Workspaces ----------
workspace = 1, monitor:DP-2, default:true
workspace = 2, monitor:DP-1, default:true
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2


# ---------- Environment ----------
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# NVIDIA / Wayland helpers
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Better Wayland app behaviour
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland


# ---------- Programs ----------
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun
$mainMod = SUPER


# ---------- Autostart ----------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE HYPRLAND_INSTANCE_SIGNATURE

# disabled because legend0804-autostart starts Waybar: exec-once = waybar
# disabled because SwayNC is used now: exec-once = mako
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = /usr/lib/polkit-kde-authentication-agent-1
# kept as fallback, disabled duplicate old dashboard autostart: exec-once = sleep 2 && /home/aetherelic/.local/bin/hypr-dashboard

# kept as fallback, disabled duplicate old dashboard autostart: exec-once = sleep 2 && /home/aetherelic/.local/bin/hypr-dashboard
# disabled for Legend0804 Waybar rice: exec-once = systemctl --user restart eww.service

# Wallpaper daemon

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


# ---------- Input ----------
input {
    kb_layout = gb
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}


# ---------- General look ----------
general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2

    col.active_border = rgba(89b4faee) rgba(cba6f7ee) rgba(f5c2e7ee) 45deg
    col.inactive_border = rgba(313244aa)

    layout = dwindle
}

# ---------- Decoration ----------
decoration {
    rounding = 14

    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 5
        passes = 3
        vibrancy = 0.18
        new_optimizations = true
    }
}

# ---------- Animations ----------
animations {
    enabled = true

    # Premium Apple-like motion:
    # soft acceleration, gentle deceleration, no harsh bounce.
    bezier = appleEaseOut, 0.22, 1.00, 0.36, 1.00
    bezier = appleEaseIn, 0.64, 0.00, 0.78, 0.00
    bezier = appleEaseInOut, 0.65, 0.00, 0.35, 1.00
    bezier = appleSoft, 0.25, 0.90, 0.25, 1.00
    bezier = appleWorkspace, 0.16, 1.00, 0.30, 1.00
    bezier = appleLayer, 0.20, 0.90, 0.20, 1.00

    # Windows: subtle scale-in/out, no aggressive bounce.
    animation = windows, 1, 5.8, appleSoft, popin 92%
    animation = windowsIn, 1, 5.8, appleEaseOut, popin 94%
    animation = windowsOut, 1, 4.2, appleEaseIn, popin 96%
    animation = windowsMove, 1, 6.0, appleEaseOut

    # Borders and opacity fades.
    animation = border, 1, 7.5, appleEaseOut
    animation = borderangle, 1, 7.5, appleEaseOut
    animation = fade, 1, 5.0, appleEaseOut
    animation = fadeIn, 1, 4.6, appleEaseOut
    animation = fadeOut, 1, 3.6, appleEaseIn
    animation = fadeDim, 1, 4.6, appleEaseOut
    animation = fadeShadow, 1, 4.6, appleEaseOut

    # Layers: Waybar, Wofi, Mako, lock/power overlays.
    animation = layers, 1, 5.2, appleLayer, fade
    animation = layersIn, 1, 5.2, appleLayer, slide
    animation = layersOut, 1, 3.8, appleEaseIn, slide
    animation = fadeLayers, 1, 4.6, appleEaseOut
    animation = fadeLayersIn, 1, 4.6, appleEaseOut
    animation = fadeLayersOut, 1, 3.4, appleEaseIn

    # Workspaces: smooth, premium slide motion.
    animation = workspaces, 1, 6.8, appleWorkspace, slide
    animation = workspacesIn, 1, 6.8, appleWorkspace, slide
    animation = workspacesOut, 1, 6.2, appleEaseInOut, slide

    # Special workspace/dropdown.
    animation = specialWorkspace, 1, 5.8, appleWorkspace, slidevert
}



# ---------- Misc ----------
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
}

# ---------- Window rules ----------

# Prevent apps from forcing weird maximize behaviour
windowrule = match:class .*, suppress_event maximize

# Floating utility windows
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on

# Picture-in-picture
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on


# ---------- Dashboard windows ----------
# DP-1 starts at 2560x180 and is 1920x1080.

# ---------- Dashboard windows ----------
# DP-1 right monitor: 1920x1080 at 2560x180
# Because monitor DP-1 is specified, move coordinates are relative to DP-1.

windowrule = match:class ^(dash-.*)$, workspace 2 silent
windowrule = match:class ^(dash-.*)$, monitor DP-1
windowrule = match:class ^(dash-.*)$, float on
windowrule = match:class ^(dash-.*)$, no_blur on
windowrule = match:class ^(dash-.*)$, no_shadow on
windowrule = match:class ^(dash-.*)$, opacity 0.93 override 0.93 override

# Left system panel
windowrule = match:class ^(dash-btop)$, size 880 1056
windowrule = match:class ^(dash-btop)$, move 12 12

# Top info / fastfetch-style panel
windowrule = match:class ^(dash-info)$, size 560 360
windowrule = match:class ^(dash-info)$, move 902 12

# Bonsai panel
windowrule = match:class ^(dash-ascii)$, size 436 640
windowrule = match:class ^(dash-ascii)$, move 1472 12

# Status / clock panel
windowrule = match:class ^(dash-cava)$, size 560 270
windowrule = match:class ^(dash-cava)$, move 902 382

# Album art panel
windowrule = match:class ^(dash-cover)$, size 300 408
windowrule = match:class ^(dash-cover)$, move 902 662

# Spotify info panel
windowrule = match:class ^(dash-music)$, size 696 408
windowrule = match:class ^(dash-music)$, move 1212 662

# ---------- Main keybinds ----------
# disabled duplicate SUPER+RETURN terminal bind: bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, R, exec, $menu
bind = $mainMod, E, exec, $fileManager

bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating
bind = $mainMod SHIFT, M, exit
# disabled old powermenu bind: bind = $mainMod SHIFT, P, exec, /home/aetherelic/.local/bin/powermenu

# Reload config
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Dashboard on second monitor
# old dashboard moved to SUPER+CTRL+G: bind = $mainMod, G, exec, /home/aetherelic/.local/bin/hypr-dashboard

# App shortcuts
bind = $mainMod, B, exec, firefox
bind = $mainMod, D, exec, discord
bind = $mainMod, P, exec, pavucontrol

# Clipboard history
bind = $mainMod, C, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy


# ---------- Focus movement ----------
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, H, movefocus, l
# disabled for new powermenu bind: bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d


# ---------- Move windows ----------
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod SHIFT, H, movewindow, l
# disabled for new powermenu bind: bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d


# ---------- Workspaces ----------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# ---------- Scroll through workspaces ----------
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# ---------- Mouse binds ----------
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# ---------- Screenshots ----------
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, Print, exec, grim ~/Pictures/Screenshots/screenshot-$(date +%Y-%m-%d-%H%M%S).png


# ---------- Audio ----------
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous


# ---------- Brightness ----------
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-


# ---------- Lock ----------
bind = $mainMod SHIFT, Q, exec, hyprlock

# disabled for new powermenu bind: bind = $mainMod, L, exec, hyprlock

# Wallpaper daemon

