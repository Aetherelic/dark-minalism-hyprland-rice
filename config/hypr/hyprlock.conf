# Premium Unixporn Hyprlock
# Dark glass / sage / minimal

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.015
    contrast = 0.88
    brightness = 0.42
    vibrancy = 0.08
    vibrancy_darkness = 0.15
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(d7dbd2ff)
    font_size = 96
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 95
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %d %B"
    color = rgba(9db6adff)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, -5
    halign = center
    valign = center
}

label {
    monitor =
    text = aetherelic // premium unixporn
    color = rgba(8b9892ff)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -58
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 360, 58
    outline_thickness = 1

    dots_size = 0.22
    dots_spacing = 0.28
    dots_center = true

    outer_color = rgba(9db6ad66)
    inner_color = rgba(080d10cc)
    font_color = rgba(d7dbd2ff)
    fade_on_empty = false

    placeholder_text = <span foreground="##8b9892">enter password</span>
    hide_input = false

    check_color = rgba(c3ccb8ff)
    fail_color = rgba(b9828dff)
    fail_text = <span foreground="##b9828d">access denied</span>

    rounding = 999

    position = 0, -145
    halign = center
    valign = center
}
