# =========================================================
# Premium Unixporn Feel Layer - Hyprland 0.54 compatible
# =========================================================

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    col.active_border = rgba(9db6adff) rgba(c3ccb8ff) 45deg
    col.inactive_border = rgba(5f6f6b66)

    resize_on_border = true
    extend_border_grab_area = 12
    hover_icon_on_border = true

    layout = dwindle
}

decoration {
    rounding = 18
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 24
        render_power = 3
        color = rgba(00000066)
        color_inactive = rgba(00000044)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        vibrancy = 0.10
        ignore_opacity = true
        new_optimizations = true
        xray = false
    }
}

animations {
    enabled = true

    bezier = premium, 0.16, 1, 0.3, 1
    bezier = premiumOut, 0.32, 0, 0.67, 0
    bezier = soft, 0.25, 0.1, 0.25, 1
    bezier = workspace, 0.19, 1, 0.22, 1

    animation = windows, 1, 5, premium, popin 86%
    animation = windowsOut, 1, 4, premiumOut, popin 88%
    animation = windowsMove, 1, 5, premium
    animation = border, 1, 8, soft
    animation = borderangle, 1, 10, soft
    animation = fade, 1, 5, soft
    animation = fadeIn, 1, 4, soft
    animation = fadeOut, 1, 4, premiumOut
    animation = workspaces, 1, 6, workspace, slidefade 18%
    animation = specialWorkspace, 1, 5, premium, slidefadevert 18%
    animation = layers, 1, 4, premium, fade
    animation = layersOut, 1, 4, premiumOut, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
    allow_small_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    focus_on_activate = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
}

cursor {
    no_hardware_cursors = false
}

# ---------- Layer rules - new syntax ----------
layerrule = match:namespace waybar, blur on
layerrule = match:namespace waybar, ignore_alpha 0.2

layerrule = match:namespace rofi, blur on
layerrule = match:namespace rofi, ignore_alpha 0.2

layerrule = match:namespace swaync-control-center, blur on
layerrule = match:namespace swaync-control-center, ignore_alpha 0.2

layerrule = match:namespace swaync-notification-window, blur on
layerrule = match:namespace swaync-notification-window, ignore_alpha 0.2

# ---------- Window rules - new syntax ----------
# Rofi
windowrule = match:class ^(Rofi)$, float on
windowrule = match:class ^(Rofi)$, center on
windowrule = match:class ^(Rofi)$, border_size 0
windowrule = match:class ^(Rofi)$, rounding 28
windowrule = match:class ^(Rofi)$, opacity 0.96 0.96

# Dashboard widgets
windowrule = match:class ^(legenddash-.*)$, float on
windowrule = match:class ^(legenddash-.*)$, no_initial_focus on
windowrule = match:class ^(legenddash-.*)$, rounding 22
windowrule = match:class ^(legenddash-.*)$, opacity 0.94 0.94

# Utility apps
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(pavucontrol)$, center on
windowrule = match:class ^(pavucontrol)$, size 900 600
windowrule = match:class ^(pavucontrol)$, rounding 22

# Picture-in-picture
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, keep_aspect_ratio on
windowrule = match:title ^(Picture-in-Picture)$, rounding 18

# Games/fullscreen apps
windowrule = match:class ^(steam_app_.*)$, immediate on
windowrule = match:class ^(steam_app_.*)$, no_blur on
windowrule = match:class ^(steam_app_.*)$, opacity 1.0 1.0
