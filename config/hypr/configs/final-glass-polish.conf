# =========================================================
# Final Glass Polish
# Subtle opacity/blur layer for premium unixporn finish
# =========================================================

decoration {
    rounding = 18
    active_opacity = 0.98
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 28
        render_power = 3
        color = rgba(00000070)
        color_inactive = rgba(0000004d)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.12
        ignore_opacity = true
        new_optimizations = true
        xray = false
    }
}

# Keep games and fullscreen apps clean
windowrule = match:class ^(steam_app_.*)$, opacity 1.0 1.0
windowrule = match:class ^(steam_app_.*)$, no_blur on

# Keep dashboard and rice UI consistent
windowrule = match:class ^(legenddash-.*)$, opacity 0.94 0.94
windowrule = match:class ^(Rofi)$, opacity 0.97 0.97
