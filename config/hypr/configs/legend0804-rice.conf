# Legend0804 Hyprland rice overlay
# Visual merge only.

source = ~/.cache/wal/colors-hyprland.conf

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = $color4
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# BEGIN SPOTIFY GLASS
windowrule = match:class ^(Spotify)$, opacity 0.78 0.78
windowrule = match:title ^(Spotify Premium)$, opacity 0.78 0.78
# END SPOTIFY GLASS




# BEGIN VESKTOP SAFE GLASS
# Safe Discord/Vesktop glass effect without fragile Vencord CSS themes.
windowrule = match:class ^(vesktop)$, opacity 0.86 0.86
windowrule = match:class ^(Vesktop)$, opacity 0.86 0.86
windowrule = match:class ^(vesktop)$, opaque off
windowrule = match:class ^(Vesktop)$, opaque off
# disabled app workspace pin: windowrule = match:class ^(vesktop)$, workspace 3
# disabled app workspace pin: windowrule = match:class ^(Vesktop)$, workspace 3
# END VESKTOP SAFE GLASS


# BEGIN DASHBOARD WORKSPACE PIN
